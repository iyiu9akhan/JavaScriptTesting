<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="container">
      <div class="view_portion">
        <div class="top">
          <h1>body mass index</h1>
          <p>
            BMI (Body Mass Index) calculator is a tool that measures a person's
            body fat based on their weight and height. It helps determine
            whether someone is underweight, normal weight, overweight, or obese.
          </p>
        </div>
        <div class="middle">
          <div class="left">
            <img src="img/boy-img.png" alt="boy-img" />
          </div>
          <div class="right">
            <div class="name">
              <h6>name</h6>
              <div class="input_box">
                <input type="text" placeholder="your name" id="name" />
                <h5 class="error_sign1"></h5>
                <!-- <h5 class="error_sign"></h5> -->
              </div>
            </div>
            <div class="gender">
              <h6>gender</h6>
              <div class="input_box">
                <input type="text" placeholder="your gender" id="gender" />
                <h5 class="error_sign2"></h5>
                <!-- <h5 class="error_sign"></h5> -->
              </div>
            </div>
            <div class="age">
              <h6>age</h6>
              <div class="input_box">
                <input type="text" placeholder="your age" id="age" />
                <h5 class="error_sign3"></h5>
                <!-- <h5 class="error_sign"></h5> -->
              </div>
            </div>
            <div class="height">
              <h6>height</h6>
              <div class="input_box">
                <input type="text" placeholder="your height" id="height" />
                <h5 class="error_sign4"></h5>
                <!-- <h5 class="error_sign"></h5> -->
              </div>
            </div>
            <div class="weight">
              <h6>weight</h6>
              <div class="input_box">
                <input type="text" placeholder="your weight" id="weight" />
                <h5 class="error_sign5"></h5>
                <!-- <h5 class="error_sign"></h5> -->
              </div>
            </div>
          </div>
        </div>
        <p class="error_text"></p>
        <div class="bottom">
          <button class="calculate_btn" onclick="calculate()">calculate</button>
        </div>
      </div>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
