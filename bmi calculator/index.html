<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="container">
      <div class="view_portion">
        <div class="top">
          <h1>body mass index</h1>
          <p>
            BMI (Body Mass Index) calculator is a tool that measures a person's
            body fat based on their weight and height. It helps determine
            whether someone is underweight, normal weight, overweight, or obese.
          </p>
        </div>
        <div class="middle">
          <div class="left">
            <img src="img/boy-img.png" alt="boy-img" />
          </div>
          <div class="right">
            <div class="name">
              <h6>name</h6>
              <input type="text" placeholder="your name" id="name"/>
            </div>
            <div class="gender">
              <h6>gender</h6>
              <input type="text" placeholder="your gender" id="gender"/>
            </div>
            <div class="age">
              <h6>age</h6>
              <input type="number" placeholder="your age" id="age"/>
            </div>
            <div class="height">
              <h6>height ( CM )</h6>
              <input type="number" placeholder="your height" id="height"/>
            </div>
            <div class="weight">
              <h6>weight ( KG ) </h6>
              <input type="number" placeholder="your weight" id="weight"/>
            </div>
          </div>
        </div>
        <div class="bottom">
          <button class="calculate_btn" onclick="calculate()">calculate</button>
        </div>
      </div>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
